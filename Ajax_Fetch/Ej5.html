<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 5</title>
</head>
<body>
    <h1>Ejercicio 5</h1>
    <p>Utilizando el fichero super.json, muestra aquellos superhéroes que tengan 3 o menos superpoderes</p>
    <button onclick="mostrar()">Mostrar superhéroes con 3 o menos superpoderes</button>

    <p id="demo"></p>
    <script>
        async function mostrar(){
            const respuesta = await fetch("supers.json");
            const datos = await respuesta.text();

            const obj = JSON.parse(datos);

            for(let i = 0; i < obj.members.length; i++){
                
                if(obj.members[i].powers.length <= 3){
                    let parrafo = document.createElement("p");
                    parrafo.textContent = obj.members[i].name + " || Superpoderes: " + obj.members[i].powers;
                    document.getElementById("demo").appendChild(parrafo);
                }
                
            }
        }
    </script>
</body>
</html>
